name: Release

# Trigger on version tags (e.g. v0.2.0).
# The repo stays private; the release is a draft until you manually publish it.
# To cut a release:
#   1. Ensure bundle prerequisites are met (see ## Release Prerequisites below).
#   2. Bump version in package.json and src-tauri/Cargo.toml and src-tauri/tauri.conf.json.
#   3. Commit, then: git tag v0.x.0 && git push origin v0.x.0
#   4. This workflow runs and creates a draft release with platform installers.
#   5. Review artifacts, then manually publish the release on GitHub.
#
# ## Release Prerequisites (one-time setup)
#
# Icons:
#   Run `npm run tauri icon path/to/source-icon.png` to generate the icon set,
#   then commit the generated files under src-tauri/icons/ and update
#   the "icon" array in tauri.conf.json. Builds will warn but proceed without icons.
#
# Code signing (optional for dev-only releases):
#   Set these repository secrets to sign installers:
#   - TAURI_SIGNING_PRIVATE_KEY     (base64-encoded private key)
#   - TAURI_SIGNING_PRIVATE_KEY_PASSWORD
#   Generate with: npm run tauri signer generate -- -w ~/.tauri/myapp.key
#   macOS notarization and Windows Authenticode signing are separate; skip for dev.
#
# GITHUB_TOKEN is automatically provided by Actions — no setup needed.

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

jobs:
  release:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: '--target universal-apple-darwin'
          - platform: ubuntu-22.04
            args: ''
          - platform: windows-latest
            args: ''

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Cache Rust build
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install Linux system dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            build-essential \
            curl \
            wget \
            file \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev

      - name: Install frontend dependencies
        run: npm ci

      - name: Build and release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'Diamond Prompt Runner ${{ github.ref_name }}'
          releaseBody: |
            Developer release — see commit history for changes.
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
