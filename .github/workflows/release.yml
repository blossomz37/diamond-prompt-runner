name: Release

# Automated release pipeline.
# Trigger by pushing a version tag (e.g. v0.1.0). The workflow:
#   1. Builds a signed universal-macOS .app.tar.gz + .sig
#   2. Generates latest.json (handled by tauri-action when
#      bundle.createUpdaterArtifacts is true in tauri.conf.json)
#   3. Creates a DRAFT GitHub Release with all three assets attached
#
# After the run finishes, review the draft release in the GitHub UI and
# click Publish. The updater endpoint resolves to the latest *published*
# release, so a draft will not be picked up by installed clients until
# you publish it. See release-procedure.md for the full flow.
#
# Required repository secrets:
#   TAURI_SIGNING_PRIVATE_KEY            contents of ~/.tauri/diamond-runner.key
#   TAURI_SIGNING_PRIVATE_KEY_PASSWORD   the key's password (currently: diamond)
#
# GITHUB_TOKEN is provided automatically by Actions.
#
# Linux and Windows are intentionally excluded — the manual procedure
# only validates macOS, and adding other targets requires platform-specific
# signing/notarization setup that does not exist yet.

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

jobs:
  release:
    runs-on: macos-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Rust stable (universal targets)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Cache Rust build
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install frontend dependencies
        run: npm ci

      - name: Build, sign, and create draft release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'Diamond Prompt Runner ${{ github.ref_name }}'
          releaseBody: |
            Developer release — see commit history for changes.

            After verifying the attached `.app.tar.gz`, `.sig`, and
            `latest.json` assets, click **Publish release** to make this
            visible to in-app update checks.
          releaseDraft: true
          prerelease: false
          args: '--target universal-apple-darwin'
